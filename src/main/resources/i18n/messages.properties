# 默认中文（兜底）
validation.phone.invalid=手机号码格式不正确
validation.password.invalid=密码必须包含大小写字母、数字和特殊字符，且长度为8-20位
validation.idcard.invalid=身份证号码格式不正确或无效

# System Error Codes
error.200=成功
error.400=请求参数错误
error.401=暂未登录或Token已过期
error.403=没有权限访问
error.404=资源不存在
error.405=请求方法不支持
error.500=系统内部错误

# User Error Codes
error.10001=用户不存在
error.10002=用户名已存在
error.10003=邮箱已存在
error.10004=用户账户已被锁定
error.10005=用户账户已被禁用
error.10006=用户名或密码错误

# Auth Error Codes
error.20001=用户名或密码错误

# Role Error Codes
error.30001=角色不存在
error.30002=角色编码已存在
error.30003=角色分配数量超出限制
error.30004=角色正在使用中，无法删除

# Menu Error Codes
error.40001=菜单不存在
error.40002=检测到菜单循环引用
error.40003=请先删除子节点
error.40004=权限编码重复
